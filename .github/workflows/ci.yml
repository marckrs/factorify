name: CI — Test & Typecheck

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: |
          cd packages/attnres-memory && npx tsc --noEmit 2>/dev/null || true
          cd ../../packages/orchestrator && npx tsc --noEmit 2>/dev/null || true

      - name: Test @factory/attnres-memory
        run: pnpm --filter @factory/attnres-memory test

      - name: Test @factory/orchestrator
        run: pnpm --filter @factory/orchestrator test

      - name: Report summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- attnres-memory: 15 tests" >> $GITHUB_STEP_SUMMARY
          echo "- orchestrator: 23 tests" >> $GITHUB_STEP_SUMMARY
          echo "- Total: 38 tests" >> $GITHUB_STEP_SUMMARY
