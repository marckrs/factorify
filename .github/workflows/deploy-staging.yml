name: Deploy → Staging (autônomo)

on:
  push:
    branches: [develop]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-api-staging:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy API to Vercel (staging)
        run: |
          cd apps/api
          npx vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --env SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --env SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            --env FACTORY_API_KEY=${{ secrets.FACTORY_API_KEY }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Health check
        run: |
          sleep 10
          curl -f "${{ vars.STAGING_API_URL }}/health" || exit 1
          echo "Staging API healthy"
